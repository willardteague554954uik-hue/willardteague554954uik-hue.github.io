    <pcom-module-wrapper id="pcom-c64d7567459cf1bd01b018f5c951fcefc35d8ac59f0c7789d8c0dd4f22091d18" :position="1" :occurrence="1" background-color="none" module-name="Text-Content" :module-tags="[]">

            <text-content sid="{215B0A33-1E15-4EBD-8A75-EF3AEBF2CC5B}" sid_legacy="{215B0A33-1E15-4EBD-8A75-EF3AEBF2CC5B}" v-bind="{&#39;layout&#39;:&#39;single&#39;,&#39;variant&#39;:&#39;default&#39;,&#39;heading&#39;:&#39;&#39;,&#39;subheading&#39;:&#39;&#39;,&#39;columns&#39;:[{&#39;items&#39;:[{&#39;size&#39;:&#39;small&#39;,&#39;content&#39;:&#39;&lt;p-text>In model year 1978, the 911 range was reduced to two models, with the 911 SC (Super Carrera) replacing the 911 and Carrera models. From model year 1984, the SC version was in turn replaced by the 911 Carrera.\n&lt;br />\n&lt;br />\n&lt;strong>Surrounds and door handles&lt;/strong>\n&lt;br />\nUp until model year 1978, the window surrounds and door handles on the 911 SC were chrome-plated just like on previous 911 models; from model year 1979 they were anodised Black, as with the Carrera models.\n&lt;br />\n&lt;br />\n&lt;strong>Wheels&lt;/strong>\n&lt;br />\n15&quot; ATS cast aluminium wheels were fitted as standard on the 911 SC.\n&lt;br />\n&lt;br />\n&lt;strong>Exterior mirrors&lt;/strong>\n&lt;br />\nThe exterior mirrors of the 911 SC were electrically adjustable and painted in the vehicle colour.\n&lt;br />\n&lt;br />\n&lt;strong>Engines&lt;/strong>\n&lt;br />\nThe 911 SC was powered by a 3.0-litre boxer engine, the power of which was slightly increased over the years.\n&lt;br />\n&lt;br />\n&lt;p-text-list>\n&lt;p-text-list-item>MY 1978–79 – 3.0 litres, 180 PS&lt;/p-text-list-item>\n&lt;p-text-list-item>MY 1980 – 3.0 litres, 188 PS&lt;/p-text-list-item>\n&lt;p-text-list-item>MY 1981–83 – 3.0 litres, 204 PS&lt;/p-text-list-item>\n&lt;/p-text-list>\n&lt;br />\n&lt;br />\n&lt;strong>Bodyshell&lt;/strong>\n&lt;br />\nThe 911 SC had the same wider bodyshell as the 911 Carrera. From model year 1981, vehicles can be seen to have side indicator lights on the front wings.\n&lt;br />\nFrom model year 1983, the 911 SC Cabriolet was the first completely open-top 911 to have a fabric roof and was available alongside the Coupé version and the Targa safety cabriolet.\n&lt;br />\n&lt;br />\n&lt;strong>Headlight rings&lt;/strong>\n&lt;br />\nThe headlight rings of the 911 SC were initially chrome-plated, but were painted in the vehicle colour from model year 1979.&lt;/p-text>\n&lt;br class=&quot;t-last-br&quot; />&#39;,&#39;layoutColumn&#39;:0,&#39;type&#39;:&#39;text-content-paragraph&#39;}]}]}" />
</pcom-module-wrapper>

  <template #headline>Porsche Classic Partner</template>
  <template #copytext>Porsche is constantly expanding its skill-set for working with classic Porsche cars. Selected Porsche centers are (or will be) Porsche Classic Partners, and your classic car is in good hands here: Certified experts are on hand to answer any questions you may have, whether about a repair, a parts replacement, or simply your shared interest in classic Porsches.</template>
</content-info></pcom-module-wrapper>

  <template #headline>Factory restoration</template>
  <template #copytext>The primary goal of the Porsche Classic Factory Restoration team is to maintain and care for historic Porsche vehicles. We have decades of experience in servicing, repairing, and restoring classic and vintage Porsche series production vehicles, so you can trust us as a specialist contact for your car. We use original special tools and have access to all technical documentation and the Porsche archive. So you can be sure that your classic car is in the best hands.</template>
